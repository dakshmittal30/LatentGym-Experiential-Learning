<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trajectory Explorer — Cross-Task Adaptation</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="explorer">
<div id="nav-root"></div>

<section class="hero" style="padding:32px 0 6px">
  <div class="wrap">
    <div class="section-tag">Interactive</div>
    <h1 style="font-size:2.1rem">Trajectory Explorer</h1>
    <p class="lede" style="margin-bottom:1em">Pick a variant, environment, latent, prompt, and feedback,
      then press <b>Play</b> to watch the agent play — turn by turn. Toggle <b>before/after</b> to compare
      Qwen3-8B with and without Cross-Task RL on the same task.</p>
  </div>
</section>

<section style="padding-top:6px">
  <div class="wrap">
    <div class="exp-filters" id="filters">
      <div class="fld"><label>Variant</label><select id="f-variant"></select></div>
      <div class="fld"><label>Model</label><select id="f-model"></select></div>
      <div class="fld"><label>Environment</label><select id="f-env"></select></div>
      <div class="fld"><label>Latent</label><select id="f-latent"></select></div>
      <div class="fld"><label>Prompt</label><select id="f-prompt"></select></div>
      <div class="fld"><label>Feedback</label><select id="f-feedback"></select></div>
      <div class="fld"><label>Horizon</label><select id="f-horizon"></select></div>
      <div class="fld"><label>Seed</label><select id="f-seed"></select></div>
      <div class="fld" style="justify-content:end">
        <label style="text-transform:none;letter-spacing:0;color:var(--ink);font-weight:600;display:flex;align-items:center;gap:7px;cursor:pointer">
          <input type="checkbox" id="f-compare"> Before/after RL
        </label>
      </div>
    </div>
    <div id="status" class="small muted" style="margin:10px 2px"></div>

    <!-- single-trajectory view -->
    <div id="single-view">
      <div class="player-controls" id="controls" style="display:none">
        <button class="btn" id="btn-restart" title="Restart">⏮</button>
        <button class="btn" id="btn-prev" title="Step back">◀</button>
        <button class="btn primary" id="btn-play" title="Play / pause">▶ Play</button>
        <button class="btn" id="btn-next" title="Step forward">▶</button>
        <input type="range" class="scrub" id="scrub" min="0" max="0" value="0">
        <span class="ctr" id="ctr">0 / 0</span>
        <select id="speed" title="Speed" style="padding:7px 10px;border:1px solid var(--line);border-radius:8px">
          <option value="1400">0.5×</option>
          <option value="700" selected>1×</option>
          <option value="350">2×</option>
          <option value="150">4×</option>
        </select>
        <button class="btn" id="btn-all" title="Reveal everything">Show all</button>
      </div>
      <div id="exp-head"></div>
      <div id="exp-summary"></div>
      <div id="exp-body"></div>
    </div>

    <!-- compare view -->
    <div id="compare-root" style="display:none"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="assets/js/site.js"></script>
<script src="assets/js/explorer.js"></script>
</body>
</html>
